<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניטור שרתים - מדד שימוש</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333333;
            margin-bottom: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #dddddd;
        }
        th {
            background-color: #343a40;
            color: white;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        /* עיצוב עבור בר הסטטוס הצבעוני */
        .status-bar-container {
            width: 100%;
            background-color: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            height: 20px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        .status-bar {
            height: 100%;
            width: 100%; /* הבר תמיד מלא, רק הצבע שלו משתנה מקצה לקצה */
            transition: background-color 0.3s ease;
        }
        .error-message {
            color: #dc3545;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            display: none;
            margin-bottom: 15px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>מדד עומס שרתים</h1>
    <div id="error-box" class="error-message"></div>
    
    <table>
        <thead>
            <tr>
                <th style="width: 10%;">מספר</th>
                <th style="width: 30%;">מזהה שרת</th>
                <th style="width: 60%;">סטטוס שימוש (מירוק לאדום)</th>
            </tr>
        </thead>
        <tbody id="servers-table-body">
            </tbody>
    </table>
</div>

<script>
    async function loadServerData() {
        const tableBody = document.getElementById('servers-table-body');
        const errorBox = document.getElementById('error-box');
        
        try {
            const response = await fetch('servers_config.json');
            
            if (!response.ok) {
                throw new Error(`שגיאה בטעינת קובץ הנתונים: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (!data.servers || !Array.isArray(data.servers)) {
                throw new Error("מבנה קובץ ה-JSON אינו תקין.");
            }
            
            tableBody.innerHTML = ''; 
            
            // שימוש באינדקס הלולאה (index) לצורך מספור רץ אוטומטי
            data.servers.forEach((server, index) => {
                // חישוב יחס הניצול (ערך בין 0 ל-1)
                const usageRatio = Math.min(Math.max(server.credits_used / server.total_credits, 0), 1);
                
                // חישוב גוון הצבע ב-HSL:
                // כאשר הניצול הוא 0 (ירוק) -> הגוון יהיה 120
                // כאשר הניצול הוא 1 (אדום) -> הגוון יהיה 0
                const hue = (1 - usageRatio) * 120;
                const backgroundColor = `hsl(${hue}, 85%, 45%)`;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><b>${escapeHtml(server.server_name)}</b></td>
                    <td>
                        <div class="status-bar-container">
                            <div class="status-bar" style="background-color: ${backgroundColor};"></div>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            
        } catch (error) {
            errorBox.textContent = `שגיאה: ${error.message}`;
            errorBox.style.display = 'block';
            console.error(error);
        }
    }

    function escapeHtml(string) {
        return String(string).replace(/[&<>"']/g, function (s) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[s];
        });
    }

    window.addEventListener('DOMContentLoaded', loadServerData);
</script>

</body>
</html>
