<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניטור שרתי NextDNS - מדד משולש</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333333;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9em;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #dddddd;
            vertical-align: middle;
        }
        th {
            background-color: #343a40;
            color: white;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        .credits-text {
            font-size: 0.85em;
            color: #555;
            margin-top: 4px;
            display: block;
        }
        
        /* מיכל המדד הויזואלי */
        .gauge-container {
            position: relative;
            width: 100%;
            height: 35px;
            display: flex;
            align-items: center;
        }

        /* המשולש הצבעוני הרציף */
        .color-triangle {
            width: 100%;
            height: 24px;
            background: linear-gradient(to left, #28a745 0%, #ffc107 50%, #dc3545 100%);
            clip-path: polygon(0% 100%, 100% 0%, 100% 100%);
        }

        /* פס הסימון הניצב (המחוון) */
        .indicator-line {
            position: absolute;
            top: 0;
            width: 4px;
            height: 30px;
            background-color: #000000;
            border-radius: 2px;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.9);
            transform: translateX(50%);
            transition: right 0.5s ease-out;
        }

        .error-message {
            color: #dc3545;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            display: none;
            margin-bottom: 15px;
            text-align: right;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>מדד עומס שרתי NextDNS</h1>
    <div class="subtitle">רשימת שרתים דינמית מתוך ה-Google Sheets עם אימות CORS מול NextDNS</div>
    <div id="error-box" class="error-message"></div>
    
    <table>
        <thead>
            <tr>
                <th style="width: 8%;">מספר</th>
                <th style="width: 27%;">מזהה שרת</th>
                <th style="width: 65%;">סטטוס ניצול שאילתות (חודשי)</th>
            </tr>
        </thead>
        <tbody id="servers-table-body">
            <tr>
                <td colspan="3" class="loading">טוען רשימת שרתים ונתונים...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // הקישור הישיר לקובץ ה-CSV שסיפקת מתוך גוגל שיטס
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRD_922LGtR44sE2WLSs6nRB0XbKfwc3CclGKQChD_-XZaE0TMcdU1ju7F2sLjC7b3x5O8I_gsgvThw/pub?gid=0&single=true&output=csv';

    function escapeHtml(string) {
        return String(string).replace(/[&<>"']/g, function (s) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[s];
        });
    }

    // פונקציה לפירוק שורות CSV שמתמודדת בצורה דינמית ומדויקת עם מרכאות ופסיקים של גוגל שיטס
    function parseCSV(text) {
        const lines = text.split(/\r?\n/);
        return lines.map(line => {
            const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
            return matches.map(val => val.replace(/^"|"$/g, '').trim());
        }).filter(row => row.length >= 3 && row[0] !== "");
    }

    // פונקציה שמביאה את כמות השאילתות תוך עקיפת חסימת ה-CORS בעזרת פרוקסי
    async function fetchNextDnsUsage(profileId, apiKey) {
        const targetUrl = `https://api.nextdns.io/profiles/${profileId}/usage`;
        // שימוש בפרוקסי קבוע שרק מעביר את הבקשה ומחזיר את כותרות ה-CORS המתאימות
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
        
        const response = await fetch(proxyUrl, {
            method: 'GET',
            headers: {
                'X-API-Key': apiKey
            }
        });

        if (!response.ok) {
            throw new Error(`שגיאה ${response.status} (בדוק את ה-API Key או ה-Profile ID)`);
        }

        const data = await response.json();
        
        let totalUsedThisMonth = 0;
        if (data && data.data && Array.isArray(data.data)) {
            // סכימת השאילתות של כל הימים בחודש הנוכחי
            totalUsedThisMonth = data.data.reduce((sum, day) => sum + (day.queries || 0), 0);
        }

        return totalUsedThisMonth;
    }

    async function initMonitoring() {
        const tableBody = document.getElementById('servers-table-body');
        const errorBox = document.getElementById('error-box');
        
        try {
            // משיכת קובץ ה-CSV מ-Google Sheets (גוגל מאפשר CORS כברירת מחדל)
            const response = await fetch(SHEET_CSV_URL);
            if (!response.ok) {
                throw new Error(`לא ניתן לגשת לגיליון גוגל (סטטוס: ${response.status})`);
            }
            
            const csvText = await response.text();
            const rows = parseCSV(csvText);
            
            // דילוג על שורת הכותרת הראשונה של הגיליון (שורה 1)
            const serverRows = rows.slice(1);
            
            if (serverRows.length === 0) {
                throw new Error("לא נמצאו שרתים רשומים בגיליון.");
            }
            
            tableBody.innerHTML = ''; // ניקוי הודעת הטעינה
            
            // לולאה דינמית - רצה על פני כל השורות הקיימות בגיליון ללא הגבלת כמות
            for (let i = 0; i < serverRows.length; i++) {
                const row = serverRows[i];
                
                const serverName = row[0]; // עמודה A - שם השרת
                const profileId  = row[1]; // עמודה B - מזהה הפרופיל
                const apiKey     = row[2]; // עמודה C - מפתח ה-API
                
                // עמודה D היא סך הכל קרדיטים, אם היא ריקה השרת יקבל אוטומטית 300,000
                let totalCredits = (row[3] && !isNaN(row[3])) ? parseFloat(row[3]) : 300000;

                try {
                    // פנייה ל-NextDNS דרך הפרוקסי
                    const creditsUsed = await fetchNextDnsUsage(profileId, apiKey);
                    
                    // חישוב אחוזי הניצול לטובת המחוון
                    const usageRatio = Math.min(Math.max(creditsUsed / totalCredits, 0), 1);
                    const usagePercentage = usageRatio * 100;
                    
                    const tableRow = document.createElement('tr');
                    tableRow.innerHTML = `
                        <td>${i + 1}</td>
                        <td><b>${escapeHtml(serverName)}</b></td>
                        <td>
                            <div class="gauge-container">
                                <div class="color-triangle"></div>
                                <div class="indicator-line" style="right: ${usagePercentage}%;"></div>
                            </div>
                            <span class="credits-text">
                                נוצלו ${creditsUsed.toLocaleString()} מתוך ${totalCredits.toLocaleString()} שאילתות (${usagePercentage.toFixed(1)}%)
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(tableRow);
                    
                } catch (dnsError) {
                    // אם שרת אחד נכשל, הוא יוצג עם שגיאה ייעודית, ושאר הטבלה תמשיך להיטען כרגיל
                    const tableRow = document.createElement('tr');
                    tableRow.innerHTML = `
                        <td>${i + 1}</td>
                        <td><b>${escapeHtml(serverName)}</b></td>
                        <td style="color: #dc3545; font-size: 0.9em; font-weight: bold;">
                            שגיאה: ${dnsError.message}
                        </td>
                    `;
                    tableBody.appendChild(tableRow);
                }
            }
            
        } catch (error) {
            errorBox.textContent = `שגיאה כללית במערכת: ${error.message}`;
            errorBox.style.display = 'block';
            tableBody.innerHTML = `<tr><td colspan="3" style="color: #dc3545;">טעינת הנתונים נכשלה.</td></tr>`;
            console.error(error);
        }
    }

    window.addEventListener('DOMContentLoaded', initMonitoring);
</script>

</body>
</html>
