<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניטור שרתים - מדד משולש</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333333;
            margin-bottom: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #dddddd;
            vertical-align: middle;
        }
        th {
            background-color: #343a40;
            color: white;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f8f9fa;
        }
        
        /* מיכל המדד הויזואלי */
        .gauge-container {
            position: relative;
            width: 100%;
            height: 35px; /* גובה אזור המדד כולו */
            display: flex;
            align-items: center;
        }

        /* המשולש הצבעוני הרציף */
        .color-triangle {
            width: 100%;
            height: 24px;
            /* מעבר צבעים רציף מירוק, דרך צהוב/כתום, ועד אדום */
            background: linear-gradient(to left, #28a745 0%, #ffc107 50%, #dc3545 100%);
            /* חיתוך הדיב לצורת משולש שמתחיל נמוך בירוק ועולה גבוה באדום */
            clip-path: polygon(0% 100%, 100% 0%, 100% 100%);
        }

        /* פס הסימון הניצב (המחוון) */
        .indicator-line {
            position: absolute;
            top: 0;
            width: 4px;
            height: 30px;
            background-color: #000000;
            border-radius: 2px;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.9);
            transform: translateX(50%); /* מרכז את הפס על נקודת האחוז המדויקת */
            transition: right 0.5s ease-out; /* אנימציה חלקה בעת טעינת שינויים */
        }

        .error-message {
            color: #dc3545;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            display: none;
            margin-bottom: 15px;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>מדד עומס שרתים</h1>
    <div id="error-box" class="error-message"></div>
    
    <table>
        <thead>
            <tr>
                <th style="width: 10%;">מספר</th>
                <th style="width: 25%;">מזהה שרת</th>
                <th style="width: 65%;">סטטוס שימוש</th>
            </tr>
        </thead>
        <tbody id="servers-table-body">
            </tbody>
    </table>
</div>

<script>
    async function loadServerData() {
        const tableBody = document.getElementById('servers-table-body');
        const errorBox = document.getElementById('error-box');
        
        try {
            const response = await fetch('servers_config.json');
            
            if (!response.ok) {
                throw new Error(`שגיאה בטעינת קובץ הנתונים: ${response.status}`);
            }
            
            const data = await response.json();
            
            if (!data.servers || !Array.isArray(data.servers)) {
                throw new Error("מבנה קובץ ה-JSON אינו תקין.");
            }
            
            tableBody.innerHTML = ''; 
            
            data.servers.forEach((server, index) => {
                // חישוב אחוז הניצול (ערך בין 0 ל-100)
                const usageRatio = Math.min(Math.max(server.credits_used / server.total_credits, 0), 1);
                const usagePercentage = usageRatio * 100;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td><b>${escapeHtml(server.server_name)}</b></td>
                    <td>
                        <div class="gauge-container">
                            <div class="color-triangle"></div>
                            <div class="indicator-line" style="right: ${usagePercentage}%;"></div>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
            
        } catch (error) {
            errorBox.textContent = `שגיאה: ${error.message}`;
            errorBox.style.display = 'block';
            console.error(error);
        }
    }

    function escapeHtml(string) {
        return String(string).replace(/[&<>"']/g, function (s) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[s];
        });
    }

    window.addEventListener('DOMContentLoaded', loadServerData);
</script>

</body>
</html>
