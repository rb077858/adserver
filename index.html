<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניטור קרדיטים בשרתים</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #dddddd;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .error-message {
            color: #dc3545;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            display: none;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>מצב קרדיטים בשרתים</h1>
    <div id="error-box" class="error-message"></div>
    
    <table>
        <thead>
            <tr>
                <th>שם השרת</th>
                <th>קרדיטים בשימוש</th>
                <th>קרדיטים שנותרו</th>
                <th>סך הכל קרדיטים</th>
                <th>אחוז ניצול</th>
            </tr>
        </thead>
        <tbody id="servers-table-body">
            </tbody>
    </table>
</div>

<script>
    /**
     * פונקציה לטעינת נתוני השרתים מקובץ ה-JSON והצגתם בטבלה
     */
    async function loadServerData() {
        const tableBody = document.getElementById('servers-table-body');
        const errorBox = document.getElementById('error-box');
        
        try {
            // ביצוע בקשת Fetch לקובץ ה-JSON הסטטי באותו נתיב
            const response = await fetch('servers_config.json');
            
            if (!response.ok) {
                throw new Error(`שגיאה בטעינת הקובץ: ${response.status} ${response.statusText}`);
            }
            
            const data = await response.json();
            
            // אימות בסיסי של מבנה הנתונים
            if (!data.servers || !Array.isArray(data.servers)) {
                throw new Error("מבנה קובץ ה-JSON אינו תקין. צפוי מערך תחת המפתח 'servers'.");
            }
            
            tableBody.innerHTML = ''; // ניקוי הטבלה לפני הזנת נתונים
            
            data.servers.forEach(server => {
                const remainingCredits = server.total_credits - server.credits_used;
                const usagePercentage = ((server.credits_used / server.total_credits) * 100).toFixed(1);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><b>${escapeHtml(server.server_name)}</b></td>
                    <td>${server.credits_used.toLocaleString()}</td>
                    <td>${remainingCredits.toLocaleString()}</td>
                    <td>${server.total_credits.toLocaleString()}</td>
                    <td>${usagePercentage}%</td>
                `;
                tableBody.appendChild(row);
            });
            
        } catch (error) {
            errorBox.textContent = `שגיאה: ${error.message}`;
            errorBox.style.display = 'block';
            console.error("Fetch error:", error);
        }
    }

    /**
     * פונקציית עזר למניעת מתקפות XSS בעת הזנת טקסט חופשי מה-JSON ל-HTML
     */
    function escapeHtml(string) {
        return String(string).replace(/[&<>"']/g, function (s) {
            return {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[s];
        });
    }

    // הפעלת הפונקציה עם טעינת הדף
    window.addEventListener('DOMContentLoaded', loadServerData);
</script>

</body>
</html>
